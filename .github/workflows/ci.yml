name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  extension:
    name: Extension
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20
      - run: npm test
      - run: npm run build

  native-host:
    name: Native host (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    defaults:
      run:
        working-directory: native-host
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: native-host/go.mod
          cache-dependency-path: native-host/go.mod
      - if: runner.os == 'Windows'
        name: Validate Windows installer scripts
        shell: pwsh
        working-directory: ${{ github.workspace }}
        run: |
          $allErrors = @()
          foreach ($path in @('scripts/install-windows.ps1', 'scripts/uninstall-windows.ps1', 'scripts/install-mcp-windows.ps1', 'scripts/uninstall-mcp-windows.ps1')) {
            $tokens = $null
            $parseErrors = $null
            [System.Management.Automation.Language.Parser]::ParseFile((Resolve-Path $path), [ref]$tokens, [ref]$parseErrors) | Out-Null
            $allErrors += $parseErrors
          }
          if ($allErrors.Count -gt 0) { throw ($allErrors.Message -join [Environment]::NewLine) }
      - run: go vet ./...
      - run: go test -count=1 ./...
      - if: runner.os == 'Linux'
        run: go test -race -count=1 ./...
      - run: go test -count=5 ./cmd/scopenest-host ./cmd/scopenest-mcp ./internal/browser ./internal/host ./internal/mcpserver ./internal/store
      - run: go build -buildvcs=false -trimpath ./cmd/scopenest-host
      - run: go build -buildvcs=false -trimpath ./cmd/scopenest-mcp
